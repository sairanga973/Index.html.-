<!DOCTYPE html>
<html>
<head>
    <title>VoltaX QR Scanner</title>
</head>
<body>

<h2>Voltax QR code scanner</h2>

<div id="reader" style="width:300px;"></div>
<p id="result">Scan result will appear here</p>

<!-- QR Code Library -->
<script src="https://unpkg.com/html5-qrcode"></script>

<script>
    // Function runs when QR is successfully scanned
    function onScanSuccess(decodedText) {
        document.getElementById("result").innerText = "Result: " + decodedText;
    }

    // Create scanner
    let scanner = new Html5QrcodeScanner(
        "reader",
        { fps: 10, qrbox: 250 }
    );

    // Start scanner
    scanner.render(onScanSuccess);
</script>

</body>
</html>
